<template>
    <lightning-card>
    <lightning-combobox
            name="progress"
            value={selectedRating}
            placeholder="Select filter"
            options={ratingOptions}
            onchange={handleChange} ></lightning-combobox>
            </lightning-card>
            <template for:each={filteredAccounts} for:item="acc">
                <div key={acc.Id}>
                    <lightning-card>
                    {acc.Name} | {acc.Industry} |  {acc.Phone} | {acc.Rating}
                    </lightning-card>
                </div>
            </template>

</template>
